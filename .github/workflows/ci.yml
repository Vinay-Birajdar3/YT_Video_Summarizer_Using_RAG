name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  import-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install python-dotenv youtube-transcript-api reportlab
      - name: Quick import test
        run: |
          python -c "import yt_rag.backend as b; print('OK', [n for n in dir(b) if n in ('create_vector_db','summarize_video','ask_video')])"
